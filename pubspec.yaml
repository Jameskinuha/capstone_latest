name: best_flutter_ui_templates
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
    sdk: ^3.10.3

dependencies:
    flutter:
        sdk: flutter

    cupertino_icons: ^1.0.8
    font_awesome_flutter: ^10.7.0
    flutter_rating_bar: ^4.0.1
    intl: ^0.19.0
    animations: ^2.1.1
    crypto: ^3.0.3
    
    # Calwork Dependencies
    provider: ^6.1.2
    camera: ^0.11.0+4
    path_provider: ^2.1.5
    path: ^1.9.1
    image_picker: ^1.1.2
    http: ^1.1.0
    http_parser: ^4.0.2
    supabase_flutter: ^2.6.0
    strava_client: ^2.1.3
    url_launcher: ^6.3.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^3.0.1

flutter:
    uses-material-design: true

    assets:
        - assets/images/
        - assets/fitness_app/

    fonts:
        - family: WorkSans
          fonts:
              - asset: assets/fonts/WorkSans-Regular.ttf
              - asset: assets/fonts/WorkSans-Medium.ttf
                weight: 500
              - asset: assets/fonts/WorkSans-SemiBold.ttf
                weight: 600
              - asset: assets/fonts/WorkSans-Bold.ttf
                weight: 700
        - family: Roboto
          fonts:
              - asset: assets/fonts/Roboto-Bold.ttf
              - asset: assets/fonts/Roboto-Regular.ttf
              - asset: assets/fonts/Roboto-Medium.ttf
                weight: 400
